<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Media</title>
   
</head>
<body>
    <header>
        <h1>Add New Media</h1>
    </header>

    <div class="container">
        <div class="form-container">
            <form method="POST">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter show or movie title" required>
                </div>
                
                <div class="form-group">
                    <label for="creator">Creator/Studio</label>
                    <input type="text" id="creator" name="creator" placeholder="Enter studio or creator name" required>
                </div>
                
                <div class="form-group">
                    <label for="media_type">Media Type</label>
                    <select id="media_type" name="media_type" required>
                        <option value="">-- Select Type --</option>
                        <option value="Anime">Anime</option>
                        <option value="TV Show">TV Show</option>
                        <option value="Movie">Movie</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button type="submit">Add Media</button>
                    <a href="/">
                        <button type="button" class="back-button">Cancel</button>
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
