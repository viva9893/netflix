<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Trending</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #fff;
        }
        
        header {
            background-color: #000;
            padding: 20px 40px;
            border-bottom: 3px solid #e50914;
        }
        
        h1 {
            color: #e50914;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        
        thead {
            background-color: #000;
            border-bottom: 3px solid #e50914;
        }
        
        th {
            padding: 18px;
            text-align: left;
            color: #e50914;
            font-weight: 600;
            font-size: 16px;
        }
        
        td {
            padding: 16px 18px;
            border-bottom: 1px solid #333;
            font-size: 15px;
        }
        
        tbody tr {
            transition: all 0.3s ease;
        }
        
        tbody tr:hover {
            background-color: rgba(229, 9, 20, 0.1);
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .rank {
            color: #e50914;
            font-weight: 700;
            font-size: 18px;
            width: 60px;
        }
        
        tbody tr td:nth-child(2) {
            color: #fff;
            font-weight: 500;
        }
        
        tbody tr td:nth-child(3) {
            color: #aaa;
        }
        
        tbody tr td:nth-child(4) {
            color: #e50914;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: #aaa;
            background: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
            border-radius: 8px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: #e50914;
        }
    </style>
</head>
<body>
    <header>
        <h1>Top 10 Trending</h1>
    </header>

    <div class="container">
        {% if stats %}
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Streams</th>
                </tr>
            </thead>
            <tbody>
                {% for row in stats %}
                <tr>
                    <td class="rank">{{ loop.index }}</td>
                    <td>{{ row['title'] }}</td>
                    <td>{{ row['media_type'] }}</td>
                    <td><strong>{{ row['views'] }}</strong></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty-state">
            <p>No trending data available yet.</p>
        </div>
        {% endif %}
        
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
