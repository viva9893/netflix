<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Trending</title>
    
</head>
<body>
    <header>
        <h1>Top 10 Trending</h1>
    </header>

    <div class="container">
        {% if stats %}
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Streams</th>
                </tr>
            </thead>
            <tbody>
                {% for row in stats %}
                <tr>
                    <td class="rank">{{ loop.index }}</td>
                    <td>{{ row['title'] }}</td>
                    <td>{{ row['media_type'] }}</td>
                    <td><strong>{{ row['views'] }}</strong></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty-state">
            <p>No trending data available yet.</p>
        </div>
        {% endif %}
        
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
